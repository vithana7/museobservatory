<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Muse Observatory — cocoex's archive of Stardust and Horizon campaigns, charted as a globe of the seven muses.">
  <meta name="theme-color" content="#000000">
  <title>Muse Observatory</title>
  <link rel="icon" href="/assets/images/logowhite.png" type="image/png">
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="preconnect" href="https://p.typekit.net" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/afs8ors.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Muse Observatory">
  <meta property="og:description" content="The archive of cocoex's Stardust and Horizon campaigns, charted as a globe of the seven muses.">
  <meta property="og:image" content="/assets/images/logowhite.png">
</head>
<body class="observatory">
  <a class="observatory-back" href="./"><img src="/assets/images/cocoex-text.png" alt="cocoex"></a>

  <!-- Cosmic backdrop (behind the globe; shown only when the globe is active).
       Cloud = intro cosmic-noise nebula; halo = the atmosphere hugging the sphere;
       both sit under the starfield (screen-blended) so the nebula + glow read. -->
  <canvas id="observatory-cloud" aria-hidden="true"></canvas>
  <div id="observatory-halo" aria-hidden="true"></div>
  <canvas id="observatory-starfield" aria-hidden="true"></canvas>

  <!-- The globe (decorative; the accessible source of truth is the list below) -->
  <canvas id="observatory-globe" aria-hidden="true"></canvas>

  <!-- Control rail — two ALWAYS-VISIBLE pills (Filter + List), no menu to open. Desktop: a
       vertically-centred left rail (clears the cocoex wordmark); mobile: bottom-centred row.
       Hidden until .globe-active, so it's naturally absent in reduced-motion / no-WebGL2 mode
       (where the list IS the page). Zoom is gesture-only now (pinch + scroll), no slider. -->
  <div class="filter-wrap">
    <!-- Filter pill + its facet panel (opens beside the pill on desktop, centred on mobile).
         The .filter-control wrapper is the panel's positioning anchor. Narrows the globe + list
         to the TRUE matching set (S-2). -->
    <div class="filter-control">
      <button id="observatory-filter-toggle" class="filter-pill" type="button"
              aria-expanded="false" aria-controls="observatory-filter-panel" aria-label="Filter campaigns">
        <span class="pill-glass" aria-hidden="true"></span>
        <span class="filter-pill-label">Filter</span>
      </button>
      <div id="observatory-filter-panel" class="filter-panel" hidden>
        <!-- facet groups built by observatory.js from the live campaign set -->
      </div>
    </div>

    <!-- Globe ↔ list view toggle (G-C): switch to the accessible list as a sighted peer. -->
    <button id="observatory-view-toggle" class="view-pill" type="button"
            aria-pressed="false" aria-label="Toggle list view">
      <span class="pill-glass" aria-hidden="true"></span>
      <span class="view-pill-label">List</span>
    </button>
  </div>

  <!-- Tile flip-card: tap a tile → it flips to its details (name + cause + description) -->
  <div id="observatory-flip" hidden>
    <div class="tile-flip-card">
      <div class="tile-flip-inner">
        <div class="tile-flip-front" aria-hidden="true"></div>
        <div class="tile-flip-back"></div>
      </div>
    </div>
  </div>

  <!-- Accessible / reduced-motion / no-WebGL2 fallback: the real campaign list -->
  <main id="observatory-list" class="observatory-list" aria-label="Campaign archive">
    <h1 class="observatory-list-title">Muse Observatory</h1>
    <p class="observatory-list-intro">The archive of cocoex's Stardust and Horizon campaigns.</p>
    <ul class="observatory-list-items"><!-- built from campaigns.json by observatory.js --></ul>
  </main>

  <script type="module" src="/src/observatory/observatory.js"></script>
</body>
</html>
